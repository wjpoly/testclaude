<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculatrice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <div class="brand">Calc Pro</div>

    <div class="screen">
      <div class="inputs">
        <input type="text" inputmode="decimal" id="a" placeholder="0" autocomplete="off">
        <span class="op-display" id="op-display"></span>
        <input type="text" inputmode="decimal" id="b" placeholder="0" autocomplete="off">
      </div>
      <div class="result-line">
        <span class="expr" id="expr"></span>
        <span class="result-val" id="result-val"></span>
      </div>
    </div>

    <div class="history">
      <div class="history-header">
        <span>Historique</span>
        <div class="h-btns">
          <button onclick="removeLastHistory()">↩ Dernier</button>
          <button onclick="clearHistory()">Tout effacer</button>
        </div>
      </div>
      <div class="history-list" id="history-list">
        <div class="history-empty" id="history-empty">Aucun calcul</div>
      </div>
    </div>

    <div class="keypad">
      <button class="key clear"         onclick="clearAll()">C</button>
      <button class="key digit"         onclick="inputSign()">+/-</button>
      <button class="key digit"         onclick="inputPercent()">%</button>
      <button class="key op" id="op-÷" onclick="setOp('÷')">÷</button>

      <button class="key digit" onclick="typeDigit('7')">7</button>
      <button class="key digit" onclick="typeDigit('8')">8</button>
      <button class="key digit" onclick="typeDigit('9')">9</button>
      <button class="key op"  id="op-×" onclick="setOp('×')">×</button>

      <button class="key digit" onclick="typeDigit('4')">4</button>
      <button class="key digit" onclick="typeDigit('5')">5</button>
      <button class="key digit" onclick="typeDigit('6')">6</button>
      <button class="key op"  id="op-−" onclick="setOp('−')">−</button>

      <button class="key digit" onclick="typeDigit('1')">1</button>
      <button class="key digit" onclick="typeDigit('2')">2</button>
      <button class="key digit" onclick="typeDigit('3')">3</button>
      <button class="key op"  id="op-+" onclick="setOp('+')">+</button>

      <button class="key digit zero" onclick="typeDigit('0')">0</button>
      <button class="key dot"        onclick="typeDot()">.</button>
      <button class="key equal"      onclick="compute()">=</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
